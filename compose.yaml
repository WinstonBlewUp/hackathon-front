services:
  next-app:
    build:
      context: ./my-app
      dockerfile: ../Dockerfile
    container_name: my-nextjs-app
    ports:
      - "3000:3000"
    volumes:
      - ./my-app:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    restart: unless-stopped
    command: npm run dev